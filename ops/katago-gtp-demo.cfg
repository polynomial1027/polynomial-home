# Polynomial Server 0.2.0 Demo KataGo GTP baseline.
# Run `katago benchmark` and `katago genconfig` on the actual server, then tune
# numSearchThreads, nnMaxBatchSize, the backend device, and cache size.

logDir = /var/log/polynomial-katago
logAllGTPCommunication = false
logSearchInfo = false
logSearchInfoForChosenMove = false
logToStderr = false

rules = chinese
allowResignation = false
resignThreshold = -0.90
resignConsecTurns = 3
conservativePass = true
preventCleanupPhase = true
reportAnalysisWinratesAs = SIDETOMOVE

# The Node adapter overrides maxVisits and maxTime per administrator profile.
maxVisits = 160
maxTime = 4.0
ponderingEnabled = false
lagBuffer = 0.5

# Conservative starting point for a small server. Benchmark before increasing.
numSearchThreads = 2
nnMaxBatchSize = 4
nnCacheSizePowerOfTwo = 16
