<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>账号管理 · Polynomial Server</title><link rel="stylesheet" href="/assets/site.css"></head><body><header class="nav"><div class="wrap nav-inner"><a class="brand" href="/">POLYNOMIAL <span>SERVER</span></a><nav class="nav-links" style="display:flex"><a href="/chat.html">聊天</a><button class="button secondary" id="logout">退出</button></nav></div></header><main class="wrap"><div class="page-title"><div class="eyebrow">Administration</div><h1>账号管理</h1><p>当前管理员：<span id="adminName">...</span>。可创建成员或其他管理员账号，并停用不再使用的账号。</p></div><div class="admin-layout"><form class="panel" id="createUser"><h2>创建账号</h2><div class="field"><label>登录账号</label><input id="newUsername" minlength="3" maxlength="24" required></div><div class="field"><label>显示名称</label><input id="newDisplayName" maxlength="30" required></div><div class="field"><label>初始密码（至少 10 位）</label><input id="newPassword" type="password" minlength="10" required></div><div class="field"><label>权限</label><select id="newRole"><option value="member">成员</option><option value="admin">管理员</option></select></div><div class="notice" id="adminNotice"></div><button class="button" style="width:100%">创建账号</button></form><section class="panel"><h2>已有账号</h2><div id="userList"></div></section></div></main><script src="/assets/site.js"></script></body></html>
