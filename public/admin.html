<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>管理后台 · Polynomial Server</title><link rel="stylesheet" href="/assets/site.css"><link rel="stylesheet" href="/assets/enhancements.css"></head><body><header class="nav"><div class="wrap nav-inner"><a class="brand" href="/">POLYNOMIAL <span>SERVER</span></a><nav class="nav-links" style="display:flex"><a href="/announcements.html">公告</a><a href="/chat.html">聊天</a><button class="button secondary" id="logout">退出</button></nav></div></header>
<main class="wrap"><div class="page-title"><div class="eyebrow">Administration</div><h1>管理后台</h1><p>当前管理员：<span id="adminName">...</span>。管理账号、公告、聊天与服务器参数。</p></div><div class="admin-layout"><form class="panel" id="createUser"><h2>创建账号</h2><div class="field"><label>登录账号</label><input id="newUsername" minlength="3" maxlength="24" required></div><div class="field"><label>显示名称</label><input id="newDisplayName" maxlength="30" required></div><div class="field"><label>初始密码（至少 10 位）</label><input id="newPassword" type="password" minlength="10" required></div><div class="field"><label>权限</label><select id="newRole"><option value="member">成员</option><option value="admin">管理员</option></select></div><div class="notice" id="adminNotice"></div><button class="button" style="width:100%">创建账号</button></form><section class="panel"><h2>已有账号</h2><div id="userList"></div></section></div>
<section class="panel admin-section"><div class="section-head"><div><div class="eyebrow">Changelog</div><h2>更新公告管理</h2></div><button class="button" id="newAnnouncement" type="button">发布公告</button></div><div id="adminAnnouncementList"></div></section>
<form class="panel settings-panel" id="settingsForm"><div class="section-head"><div><div class="eyebrow">Settings</div><h2>参数设置</h2></div><p>所有限制均以这里保存的数值为准。</p></div><div class="settings-grid"><div class="field"><label>允许上传文件</label><select id="allowFileUploads"><option value="true">允许</option><option value="false">关闭</option></select></div><div class="field"><label>单文件上传上限（MB）</label><input id="maxUploadMB" type="number" min="1" required></div><div class="field"><label>每条消息附件上限</label><input id="maxAttachmentsPerMessage" type="number" min="1" required></div><div class="field"><label>单条消息最多字数</label><input id="maxMessageLength" type="number" min="1" required></div><div class="field"><label>消息编辑时限（分钟，0为不限）</label><input id="editWindowMinutes" type="number" min="0" required></div><div class="field"><label>每次载入历史消息数</label><input id="messageHistoryLimit" type="number" min="1" required></div><div class="field"><label>聊天组人数上限</label><input id="maxGroupMembers" type="number" min="2" required></div><div class="field"><label>每位用户创建聊天上限</label><input id="maxConversationsPerUser" type="number" min="1" required></div><div class="field"><label>单个游戏存档上限（KB）</label><input id="maxGameSaveKB" type="number" min="1" required></div><div class="field"><label>敏感词处理</label><select id="sensitiveWordMode"><option value="mask">替换为星号</option><option value="reject">拒绝发送</option></select></div><div class="field settings-wide"><label>敏感词（每行或逗号分隔）</label><textarea id="sensitiveWords" rows="5" placeholder="敏感词一&#10;敏感词二"></textarea></div></div><div class="notice" id="settingsNotice"></div><button class="button">保存参数</button></form>
<details class="panel admin-section chat-record-manager"><summary><div><div class="eyebrow">Moderation</div><h2>聊天记录管理</h2><p>点击展开；支持搜索和分页，不再一次显示全部记录。</p></div><span>展开管理</span></summary><div class="record-toolbar"><input id="messageSearch" placeholder="搜索用户或消息内容"><button class="button secondary" id="searchMessages" type="button">搜索</button></div><div id="adminMessageList"></div><div class="record-pages"><button class="button secondary" id="prevMessagePage" type="button">上一页</button><span id="messagePageInfo">第 1 页</span><button class="button secondary" id="nextMessagePage" type="button">下一页</button></div></details></main>
<section class="panel admin-section"><div class="section-head"><div><div class="eyebrow">Storage</div><h2>网盘总览</h2><p>管理员可查看、下载或删除任何用户及公共盘文件。</p></div><button class="button secondary" id="refreshAdminDrive" type="button">刷新</button></div><div class="admin-drive-list" id="adminDriveList"></div></section>
<dialog id="editUserDialog" class="dialog"><form method="dialog" id="editUserForm"><div class="dialog-head"><h2>修改用户</h2><button value="cancel">×</button></div><input id="editUserId" type="hidden"><div class="field"><label>登录账号</label><input id="editUsername" required></div><div class="field"><label>显示名称</label><input id="editDisplayName" required></div><div class="field"><label>新密码（留空不修改）</label><input id="editPassword" type="password" minlength="10"></div><div class="field"><label>权限</label><select id="editRole"><option value="member">成员</option><option value="admin">管理员</option></select></div><div class="field"><label>状态</label><select id="editActive"><option value="true">启用</option><option value="false">禁用</option></select></div><div class="field"><label>私人网盘额度（MB）</label><input id="editDriveQuotaMB" type="number" min="0" required></div><div class="field"><label>功能权限（管理员始终拥有全部权限）</label><div class="permission-grid" id="editPermissions"><label><input type="checkbox" data-permission="accessChat">进入聊天</label><label><input type="checkbox" data-permission="postLobby">大厅发言</label><label><input type="checkbox" data-permission="createGroups">创建聊天组</label><label><input type="checkbox" data-permission="createDirect">创建私聊</label><label><input type="checkbox" data-permission="viewUsers">查看用户信息</label><label><input type="checkbox" data-permission="driveEnabled">使用私人网盘</label><label><input type="checkbox" data-permission="viewPublicDrive">查看公共盘</label><label><input type="checkbox" data-permission="uploadPublicDrive">上传公共盘</label><label><input type="checkbox" data-permission="downloadPublicDrive">下载公共盘</label><label><input type="checkbox" data-permission="accessLearning">访问网络学习</label></div></div><div class="notice" id="editUserNotice"></div><div class="dialog-actions"><button class="button">保存修改</button><button class="button danger" type="button" id="deleteUser">删除账户</button></div></form></dialog>
<dialog id="announcementDialog" class="dialog"><form method="dialog" id="announcementForm"><div class="dialog-head"><h2>编辑公告</h2><button value="cancel">×</button></div><input id="announcementId" type="hidden"><div class="field"><label>标题</label><input id="announcementTitle" maxlength="100" required></div><div class="field"><label>内容</label><textarea id="announcementContent" rows="9" maxlength="10000" required></textarea></div><div class="notice" id="announcementNotice"></div><button class="button">保存公告</button></form></dialog>
<script src="/assets/site.js"></script><script src="/assets/admin-permissions.js"></script></body></html>
