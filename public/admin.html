<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>管理后台 · Polynomial Server</title><link rel="stylesheet" href="/assets/site.css"><link rel="stylesheet" href="/assets/enhancements.css"></head><body><header class="nav"><div class="wrap nav-inner"><a class="brand" href="/">POLYNOMIAL <span>SERVER</span></a><nav class="nav-links" style="display:flex"><a href="/chat.html">聊天</a><button class="button secondary" id="logout">退出</button></nav></div></header>
<main class="wrap"><div class="page-title"><div class="eyebrow">Administration</div><h1>管理后台</h1><p>当前管理员：<span id="adminName">...</span>。管理成员账号、聊天记录与服务器参数。</p></div><div class="admin-layout"><form class="panel" id="createUser"><h2>创建账号</h2><div class="field"><label>登录账号</label><input id="newUsername" minlength="3" maxlength="24" required></div><div class="field"><label>显示名称</label><input id="newDisplayName" maxlength="30" required></div><div class="field"><label>初始密码（至少 10 位）</label><input id="newPassword" type="password" minlength="10" required></div><div class="field"><label>权限</label><select id="newRole"><option value="member">成员</option><option value="admin">管理员</option></select></div><div class="notice" id="adminNotice"></div><button class="button" style="width:100%">创建账号</button></form><section class="panel"><h2>已有账号</h2><div id="userList"></div></section></div>
<form class="panel settings-panel" id="settingsForm"><div class="section-head"><div><div class="eyebrow">Settings</div><h2>聊天参数设置</h2></div><p>保存后立即生效，无需重启服务器。</p></div><div class="settings-grid"><div class="field"><label>允许上传文件</label><select id="allowFileUploads"><option value="true">允许</option><option value="false">关闭</option></select></div><div class="field"><label>单文件上传上限（MB）</label><input id="maxUploadMB" type="number" min="1" max="100" required></div><div class="field"><label>每条消息附件上限</label><input id="maxAttachmentsPerMessage" type="number" min="1" max="10" required></div><div class="field"><label>单条消息最多字数</label><input id="maxMessageLength" type="number" min="100" max="5000" required></div><div class="field"><label>消息编辑时限（分钟，0为不限）</label><input id="editWindowMinutes" type="number" min="0" max="10080" required></div><div class="field"><label>每次载入历史消息数</label><input id="messageHistoryLimit" type="number" min="20" max="1000" required></div><div class="field"><label>聊天组人数上限</label><input id="maxGroupMembers" type="number" min="2" max="100" required></div><div class="field"><label>每位用户创建聊天上限</label><input id="maxConversationsPerUser" type="number" min="1" max="200" required></div></div><div class="notice" id="settingsNotice"></div><button class="button">保存参数</button></form>
<section class="panel admin-messages"><div class="section-head"><div><div class="eyebrow">Moderation</div><h2>聊天记录管理</h2></div><p>管理员可以查看并删除任何聊天消息。</p></div><div id="adminMessageList"></div></section></main>
<dialog id="editUserDialog" class="dialog"><form method="dialog" id="editUserForm"><div class="dialog-head"><h2>修改用户</h2><button value="cancel" aria-label="关闭">×</button></div><input id="editUserId" type="hidden"><div class="field"><label>登录账号</label><input id="editUsername" minlength="3" maxlength="24" required></div><div class="field"><label>显示名称</label><input id="editDisplayName" maxlength="30" required></div><div class="field"><label>新密码（留空表示不修改）</label><input id="editPassword" type="password" minlength="10"></div><div class="field"><label>权限</label><select id="editRole"><option value="member">成员</option><option value="admin">管理员</option></select></div><div class="field"><label>账号状态</label><select id="editActive"><option value="true">启用</option><option value="false">禁用</option></select></div><div class="notice" id="editUserNotice"></div><div class="dialog-actions"><button class="button" value="default">保存修改</button><button class="button danger" type="button" id="deleteUser">删除账户</button></div></form></dialog>
<script src="/assets/site.js"></script></body></html>
