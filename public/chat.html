<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>开发者聊天 · Polynomial Server</title><link rel="stylesheet" href="/assets/site.css"></head>
<body><header class="nav"><div class="wrap nav-inner"><a class="brand" href="/">POLYNOMIAL <span>SERVER</span></a><nav class="nav-links" style="display:flex"><a href="/">首页</a><a href="/admin.html">管理后台</a><button class="button secondary" id="logout">退出</button></nav></div></header>
<main class="chat-layout"><aside class="chat-side"><div class="eyebrow">Workspace</div><h2># 开发者大厅</h2><p style="color:var(--muted)">登录为 <strong id="currentUser">...</strong></p><small id="connection" style="color:var(--muted)">实时连接</small></aside><section class="chat-main"><header class="chat-head"><strong>开发者大厅</strong><div style="color:var(--muted);font-size:12px">回复消息或删除自己发送的内容</div></header><div class="messages" id="messages"></div><div class="reply-bar hidden" id="replyBar"><div><small>正在回复 <strong id="replyName"></strong></small><span id="replyText"></span></div><button type="button" id="cancelReply" aria-label="取消回复">×</button></div><form class="composer" id="chatForm"><input id="messageInput" maxlength="1000" autocomplete="off" placeholder="输入消息…" required><button class="button">发送</button></form></section></main>
<script src="/assets/site.js"></script></body></html>
