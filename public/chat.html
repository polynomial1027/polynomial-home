<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>聊天 · Polynomial Server</title><link rel="stylesheet" href="/assets/site.css"><link rel="stylesheet" href="/assets/enhancements.css"><link rel="stylesheet" href="/assets/chat-layout-fix.css"></head><body class="chat-page">
<header class="nav"><div class="wrap nav-inner"><a class="brand" href="/">POLYNOMIAL <span>SERVER</span></a><nav class="nav-links" style="display:flex"><a href="/">首页</a><a href="/admin.html">管理后台</a><button class="button secondary" id="logout">退出</button></nav></div></header>
<main class="chat-layout"><aside class="chat-side"><div class="chat-account"><div><div class="eyebrow">Workspace</div><strong id="currentUser">...</strong></div><button class="icon-button" id="newChatButton" title="新建聊天">＋</button></div><nav class="conversation-list" id="conversationList"></nav><small id="connection" class="connection">实时连接</small></aside><section class="chat-main"><header class="chat-head"><div><strong id="conversationTitle">聊天大厅</strong><div id="conversationInfo">团队公共留言区</div></div><button class="button danger hidden" id="deleteConversation">删除聊天</button></header><div class="messages" id="messages"></div><div class="upload-list hidden" id="uploadList"></div><div class="reply-bar hidden" id="replyBar"><div><small id="composeMode">正在回复 <strong id="replyName"></strong></small><span id="replyText"></span></div><button type="button" id="cancelReply" aria-label="取消">×</button></div><form class="composer" id="chatForm"><label class="attach-button" title="发送图片或文件">＋<input id="fileInput" type="file" multiple hidden></label><button class="attach-button" id="drivePickerButton" type="button" title="从网盘选择">☁</button><input id="messageInput" maxlength="1000" autocomplete="off" placeholder="输入消息…"><button class="button">发送</button></form></section></main>
<dialog id="drivePickerDialog" class="dialog"><div class="dialog-head"><h2>从网盘分享</h2><button type="button" onclick="this.closest('dialog').close()">×</button></div><div class="member-picker" id="drivePickerList"></div><button class="button" id="drivePickerConfirm" type="button">加入消息</button></dialog>
<dialog id="newChatDialog" class="dialog"><form method="dialog" id="newChatForm"><div class="dialog-head"><h2>发起聊天</h2><button value="cancel" aria-label="关闭">×</button></div><div class="field"><label>类型</label><select id="conversationType"><option value="direct">私聊</option><option value="group">聊天组</option></select></div><div class="field hidden" id="groupTitleField"><label>聊天组名称</label><input id="conversationName" maxlength="40"></div><div class="field"><label>选择成员</label><div class="member-picker" id="memberPicker"></div></div><div class="notice" id="conversationNotice"></div><button class="button" value="default">创建聊天</button></form></dialog>
<script src="/assets/site.js"></script></body></html>
