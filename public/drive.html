<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>文件网盘 · Polynomial Server</title><link rel="stylesheet" href="/assets/site.css"><link rel="stylesheet" href="/assets/enhancements.css"><link rel="stylesheet" href="/assets/portal.css"></head><body><header class="nav"><div class="wrap nav-inner"><a class="brand" href="/">POLYNOMIAL <span>SERVER</span></a></div></header>
<main class="wrap"><div class="page-title"><div class="eyebrow">Cloud Drive</div><h1>文件网盘</h1><p>私人文件、分享给我的文件与全服务器公共共享盘。</p></div><section class="panel"><div class="drive-meter"><div><strong id="driveUsage">读取空间…</strong><small>私人网盘额度由管理员分配</small></div><progress id="driveProgress" max="100" value="0"></progress></div><div class="drive-actions"><label class="button">上传文件<input id="driveUpload" type="file" hidden></label><select id="driveScope"><option value="private">上传到私人网盘</option><option value="public">上传到公共共享盘</option></select></div><div class="notice" id="driveNotice"></div></section>
<section class="drive-tabs"><button class="active" data-drive-tab="private">私人网盘</button><button data-drive-tab="shared">分享给我</button><button data-drive-tab="public">公共共享盘</button></section><section class="panel file-browser" id="driveFiles"></section></main>
<dialog class="dialog" id="shareDialog"><form method="dialog" id="shareForm"><div class="dialog-head"><h2>分享文件</h2><button value="cancel">×</button></div><input id="shareFileId" type="hidden"><div class="field"><label>分享给</label><select id="shareRecipient"></select></div><div class="notice" id="shareNotice"></div><button class="button">确认分享</button></form></dialog><script src="/assets/site.js"></script><script src="/assets/drive.js"></script></body></html>
